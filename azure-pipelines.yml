trigger:
- main
- develop

pool:
  vmImage: ubuntu-latest

stages:

- stage: Build
  jobs:
  - job: BuildJob
    steps:
    - script: echo "Building application..."

- stage: Deploy
  dependsOn: Build

  condition: and(
              succeeded(),
              eq(variables['Build.SourceBranch'], 'refs/heads/main')
            )

  jobs:
  - job: DeployJob
    steps:
    - script: echo "Deploying to Production..."